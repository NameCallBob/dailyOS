[tool.black]
line-length = 100
target-version = ["py39"]
exclude = '''
/(
  \.venv
  | migrations
  | staticfiles
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip = [".venv", "migrations"]
known_first_party = ["apps", "config"]

[tool.ruff]
line-length = 100
target-version = "py39"
exclude = [".venv", "migrations", "staticfiles"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.9"
plugins = ["mypy_django_plugin.main"]
ignore_missing_imports = true
exclude = ["migrations", "\\.venv"]

[tool.django-stubs]
django_settings_module = "config.settings"
