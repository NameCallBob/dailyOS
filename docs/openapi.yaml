# DailyOS API — OpenAPI 3.1 規格（由 docs/api-design.md 對應生成）
openapi: 3.1.0
info:
  title: DailyOS API
  version: 1.0.0
  description: 'DailyOS 登入模式（Auth）後端 REST API 契約。


    - 所有 JSON 欄位使用 snake_case（前端 lib/http.ts 負責與 camelCase 互轉）。

    - 分頁採 DRF 風格 { results, count, next, previous }。

    - 錯誤格式一律為 { code, message, field_errors?, request_id? }。

    - 每筆資源記錄皆繼承 BaseRecord（id/created_at/updated_at/version/deleted）。

    - 詳細欄位語意與同步策略另見 docs/api-design.md 與 docs/offline-sync.md。'
servers:
- url: '{apiBase}/'
  variables:
    apiBase:
      default: https://api.example.com
