- name: workout_sets
- name: rehab_plans
- name: rehab_exercises
- name: rehab_sessions
- name: health_documents
- name: appointments
- name: activities
- name: user_profile
- name: user_preferences
- name: notification_prefs
- name: dashboard_layout
- name: auth
- name: account
